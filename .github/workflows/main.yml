name: Deploy WebAPI to VPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: 创建docker镜像
      run: |
        docker build \
          -f ./WebAPI_CICD/Dockerfile \
          -t webapi:latest \
          ./WebAPI_CICD

    - name: 打包镜像
      run: | 
          docker save webapi:latest -o webapi.tar
          chmod 644 webapi.tar

    - name: 镜像压缩包复制到vps
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "webapi.tar"
        target: "/tmp"

    - name: 部署到 VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker load -i /tmp/webapi.tar
          docker stop webapi || true
          docker rm webapi || true
          docker run -d --name webapi --network mynet -p 5000:8080 webapi:latest
